name: Diagnose Meta Credentials

on:
  push:
    paths:
      - '.github/workflows/diagnose-meta.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect meta_tokens + hrms_meta_credentials via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          envs: APP_PATH
          script: |
            set -e
            cd "$APP_PATH"

            echo "=== META_* env presence (masked) ==="
            grep -E '^(META|HRMS)_' .env | sed 's|=.*|=***set|' || echo "NO META/HRMS env vars"

            echo ""
            echo "=== Before resolver: raw config ==="
            php artisan config:clear
            php artisan tinker --no-interaction --execute='echo "page_token=".(config("meta.page_token") ? "SET" : "EMPTY").PHP_EOL; echo "page_id=".(config("meta.page_id") ?: "EMPTY").PHP_EOL; echo "ig_account_id=".(config("meta.ig_account_id") ?: "EMPTY").PHP_EOL; echo "hrms_credentials_key=".(config("meta.hrms_credentials_key") ? "SET" : "EMPTY").PHP_EOL;'

            echo ""
            echo "=== DIS connection + tables ==="
            php artisan tinker --no-interaction --execute='try { $hasMetaTokens = DB::connection("dis")->getSchemaBuilder()->hasTable("meta_tokens"); $hasHrms = DB::connection("dis")->getSchemaBuilder()->hasTable("hrms_meta_credentials"); echo "dis.meta_tokens=".($hasMetaTokens ? "YES" : "NO").PHP_EOL; echo "dis.hrms_meta_credentials=".($hasHrms ? "YES" : "NO").PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== meta_tokens rows (DIS) ==="
            php artisan tinker --no-interaction --execute='try { $rows = DB::connection("dis")->table("meta_tokens")->select("id","token_type","page_id","ig_account_id","is_active","expires_at","created_at")->orderByDesc("id")->limit(5)->get(); foreach ($rows as $r) { echo sprintf("id=%d type=%s page_id=%s ig=%s active=%s exp=%s", $r->id, $r->token_type ?? "-", $r->page_id ?? "-", $r->ig_account_id ?? "-", $r->is_active ? "y" : "n", $r->expires_at ?? "never").PHP_EOL; } if (count($rows) === 0) echo "EMPTY".PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== hrms_meta_credentials rows (DIS) ==="
            php artisan tinker --no-interaction --execute='try { $rows = DB::connection("dis")->table("hrms_meta_credentials")->select("id","page_id","instagram_id","is_active","token_expires_at","created_at")->orderByDesc("id")->limit(5)->get(); foreach ($rows as $r) { echo sprintf("id=%d page_id=%s ig=%s active=%s exp=%s", $r->id, $r->page_id ?? "-", $r->instagram_id ?? "-", $r->is_active ? "y" : "n", $r->token_expires_at ?? "never").PHP_EOL; } if (count($rows) === 0) echo "EMPTY".PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== Resolver output (what the sync layer actually sees) ==="
            php artisan tinker --no-interaction --execute='App\Services\Meta\MetaTokenResolver::forgetCache(); App\Services\Meta\MetaTokenResolver::hydrateConfig(); echo "page_token=".(config("meta.page_token") ? "RESOLVED (len ".strlen((string) config("meta.page_token")).")" : "EMPTY").PHP_EOL; echo "page_id=".(config("meta.page_id") ?: "EMPTY").PHP_EOL; echo "ig_account_id=".(config("meta.ig_account_id") ?: "EMPTY").PHP_EOL;'

            echo ""
            echo "=== Search DIS for meta/facebook/instagram tables ==="
            php artisan tinker --no-interaction --execute='try { $rows = DB::connection("dis")->select("SHOW TABLES LIKE \"%meta%\""); foreach ($rows as $r) { echo "meta: ".array_values((array) $r)[0].PHP_EOL; } $rows = DB::connection("dis")->select("SHOW TABLES LIKE \"%facebook%\""); foreach ($rows as $r) { echo "facebook: ".array_values((array) $r)[0].PHP_EOL; } $rows = DB::connection("dis")->select("SHOW TABLES LIKE \"%instagram%\""); foreach ($rows as $r) { echo "instagram: ".array_values((array) $r)[0].PHP_EOL; } $rows = DB::connection("dis")->select("SHOW TABLES LIKE \"%token%\""); foreach ($rows as $r) { echo "token: ".array_values((array) $r)[0].PHP_EOL; } $rows = DB::connection("dis")->select("SHOW TABLES LIKE \"%credential%\""); foreach ($rows as $r) { echo "cred: ".array_values((array) $r)[0].PHP_EOL; } } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== Imported posts summary (meta_post_insights) ==="
            php artisan tinker --no-interaction --execute='try { $total = DB::table("meta_post_insights")->count(); $bySource = DB::table("meta_post_insights")->selectRaw("source, COUNT(*) c")->groupBy("source")->get(); echo "total=".$total.PHP_EOL; foreach ($bySource as $r) echo "  ".$r->source."=".$r->c.PHP_EOL; $withMedia = DB::table("meta_post_insights")->whereNotNull("media_url")->count(); $withoutMedia = $total - $withMedia; echo "with_media_url=".$withMedia." without=".$withoutMedia.PHP_EOL; $localMedia = DB::table("meta_post_insights")->where("media_url","LIKE","/storage/%")->orWhere("media_url","LIKE","storage/%")->count(); $remoteMedia = DB::table("meta_post_insights")->where(function($q){$q->where("media_url","LIKE","http://%")->orWhere("media_url","LIKE","https://%");})->count(); echo "local_path=".$localMedia." remote_url=".$remoteMedia.PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== 5 most recent insights (sample) ==="
            php artisan tinker --no-interaction --execute='try { $rows = DB::table("meta_post_insights")->orderByDesc("id")->limit(5)->get(["id","source","post_id","media_url","permalink_url","created_at_meta"]); foreach ($rows as $r) echo sprintf("id=%d src=%s pid=%s media=%s perma=%s", $r->id, $r->source, substr($r->post_id ?? "", 0, 18), $r->media_url ? substr($r->media_url, 0, 60) : "NULL", $r->permalink_url ? substr($r->permalink_url, 0, 50) : "NULL").PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'

            echo ""
            echo "=== meta-downloads dir on disk ==="
            ls -la storage/app/public/meta-downloads 2>/dev/null | head -10 || echo "dir missing"
            echo "count: $(ls storage/app/public/meta-downloads 2>/dev/null | wc -l)"

            echo ""
            echo "=== Run sync directly (FB + IG, full history) ==="
            php artisan tinker --no-interaction --execute='try { $svc = app(App\Services\Meta\MetaPostSyncService::class); $fb = $svc->syncFacebookPosts(null, 5); $ig = $svc->syncInstagramPosts(null, 5); echo "fb_synced=".$fb." ig_synced=".$ig.PHP_EOL; echo "total_insights=".DB::table("meta_post_insights")->count().PHP_EOL; echo "downloads_count=".count(glob("storage/app/public/meta-downloads/*") ?: []).PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; echo "trace: ".substr($e->getTraceAsString(), 0, 500).PHP_EOL; }'

            echo "=== DONE ==="
