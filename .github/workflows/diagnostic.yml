name: Diagnostic

on:
  push:
    paths:
      - '.github/workflows/diagnostic.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Probe studio/1 500 via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          envs: APP_PATH
          script: |
            set -e
            cd "$APP_PATH"
            echo "=== GIT ==="
            git log --oneline -3
            echo ""
            echo "=== BRIEF 1 EXISTS? ==="
            php artisan tinker --no-interaction --execute='try { $b = App\Models\Marketing\CreativeBrief::find(1); echo $b ? ("brief 1: id=".$b->id." post_type=".$b->post_type) : "brief 1 does NOT exist"; } catch (Throwable $e) { echo "EXC: ".get_class($e).": ".$e->getMessage(); }'
            echo ""
            echo ""
            echo "=== LAST 60 log lines ==="
            tail -60 storage/logs/laravel.log || echo "no log"
            echo "=== DONE ==="
