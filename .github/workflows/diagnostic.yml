name: Diagnostic

on:
  push:
    paths:
      - '.github/workflows/diagnostic.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Clear cache + probe studio/1 via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          envs: APP_PATH
          script: |
            set -e
            cd "$APP_PATH"
            echo "=== CACHE DRIVER ==="
            grep '^CACHE_' .env | grep -v PASSWORD || echo "no CACHE_ vars"
            echo ""
            echo "=== CLEAR ALL CACHES ==="
            php artisan cache:clear
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "done"
            echo ""
            echo "=== BrandKitService probe ==="
            php artisan tinker --no-interaction --execute='try { $k = app(App\Services\Marketing\BrandKitService::class)->get(); echo "OK: ".get_class($k)." id=".$k->id.PHP_EOL; } catch (Throwable $e) { echo "EXC: ".get_class($e).": ".$e->getMessage().PHP_EOL; }'
            echo ""
            echo "=== Fresh log tail (just the ERROR line) ==="
            tail -200 storage/logs/laravel.log | grep -E "^\[.*\] production" | tail -3 || echo "no fresh errors"
            echo "=== DONE ==="
