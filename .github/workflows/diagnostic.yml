name: Diagnostic

on:
  push:
    paths:
      - '.github/workflows/diagnostic.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostic via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          envs: APP_PATH
          script: |
            set -e
            cd "$APP_PATH"
            echo "=== GIT ==="
            git log --oneline -3
            echo ""
            echo "=== LARAVEL LOG (last 120 lines) ==="
            tail -120 storage/logs/laravel.log || echo "no log"
            echo ""
            echo "=== ROUTES canva ==="
            php artisan route:list --name=canva 2>&1 | head -20 || echo "route list failed"
            echo ""
            echo "=== CANVA ROUTE sync exists? ==="
            php artisan tinker --no-interaction --execute='try { echo route("marketing.api.canva.brand-kit.sync").PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'
            echo ""
            echo "=== VIEW CACHE dir ==="
            ls -la storage/framework/views/ | head -10 || true
            echo ""
            echo "=== curl brand-kit HEAD ==="
            curl -sI "http://127.0.0.1/marketing/settings/brand-kit" | head -5 || echo "curl failed"
            echo ""
            echo "=== curl daily-basket HEAD ==="
            curl -sI "http://127.0.0.1/marketing/daily-basket?week=12" | head -5 || echo "curl failed"
            echo ""
            echo "=== DONE ==="
