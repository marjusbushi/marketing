name: Diagnostic

on:
  push:
    paths:
      - '.github/workflows/diagnostic.yml'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Clear caches + verify via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          envs: APP_PATH
          script: |
            set -e
            cd "$APP_PATH"
            echo "=== BEFORE cache state ==="
            php artisan tinker --no-interaction --execute='try { $k = app(App\Services\Marketing\BrandKitService::class)->get(); echo "OK: ".get_class($k).PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }' || true
            echo ""
            echo "=== CLEAR ==="
            php artisan cache:clear
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "done"
            echo ""
            echo "=== AFTER cache state ==="
            php artisan tinker --no-interaction --execute='try { $k = app(App\Services\Marketing\BrandKitService::class)->get(); echo "OK: ".get_class($k)." id=".$k->id.PHP_EOL; } catch (Throwable $e) { echo "EXC: ".$e->getMessage().PHP_EOL; }'
            echo ""
            echo "=== LAST ERROR in log ==="
            tail -5 storage/logs/laravel.log || echo "no log"
            echo "=== DONE ==="
